<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Benison">
  <defs>
    <linearGradient id="fgPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="fgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <radialGradient id="fgNucleus" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#3A34CC"/>
    </radialGradient>
    <radialGradient id="fgGl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Orbit ring 1 — slightly thicker for small-size legibility -->
  <ellipse cx="60" cy="60" rx="54" ry="17" fill="none"
    stroke="url(#fgPC)" stroke-width="1.7" opacity="0.65"
    transform="rotate(60 60 60)"/>

  <!-- Orbit ring 2 -->
  <ellipse cx="60" cy="60" rx="48" ry="15" fill="none"
    stroke="#00D9FF" stroke-width="1.4" opacity="0.5"
    transform="rotate(-60 60 60)"/>

  <!-- Orbit ring 3 — equatorial -->
  <ellipse cx="60" cy="60" rx="51" ry="13" fill="none"
    stroke="url(#fgH)" stroke-width="1.9" opacity="0.6"/>

  <!-- Electron 1 — hero, cyan top-right -->
  <circle cx="90" cy="16" r="6.5" fill="#00D9FF"/>
  <circle cx="90" cy="16" r="13"  fill="#00D9FF" opacity="0.2"/>
  <circle cx="88" cy="14" r="2"   fill="white"   opacity="0.65"/>

  <!-- Electron 2 — purple right -->
  <circle cx="108" cy="64" r="5" fill="#6C63FF"/>
  <circle cx="108" cy="64" r="10" fill="#6C63FF" opacity="0.16"/>

  <!-- Electron 3 — bottom-left -->
  <circle cx="32" cy="100" r="5.5" fill="url(#fgPC)"/>
  <circle cx="32" cy="100" r="11"  fill="#6C63FF" opacity="0.14"/>

  <!-- Nucleus -->
  <circle cx="60" cy="60" r="22" fill="url(#fgGl2)" opacity="0.5"/>
  <circle cx="60" cy="60" r="22" fill="none"
    stroke="url(#fgPC)" stroke-width="1.4" opacity="0.45"/>
  <circle cx="60" cy="60" r="19" fill="url(#fgNucleus)"/>
  <circle cx="60" cy="60" r="9"  fill="url(#fgGl2)" opacity="0.9"/>
  <circle cx="60" cy="60" r="5"  fill="white"        opacity="0.25"/>
  <circle cx="56" cy="56" r="3"  fill="white"        opacity="0.18"/>
</svg>
