<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fgPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <linearGradient id="fgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <radialGradient id="fnucleus" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="45%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#3A34CC" />
    </radialGradient>
    <radialGradient id="fcoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- orbit ring 1 (60deg) -->
  <g transform="rotate(60 60 60)">
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="url(#fgPC)" stroke-width="1.4" />
  </g>

  <!-- orbit ring 2 (-60deg) -->
  <g transform="rotate(-60 60 60)">
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="#00D9FF" stroke-width="1.4" />
  </g>

  <!-- orbit ring 3 (equatorial) -->
  <ellipse cx="60" cy="60" rx="50" ry="14" fill="none" stroke="url(#fgH)" stroke-width="1.4" />

  <!-- E1: brightest, cyan, top-right -->
  <circle cx="90" cy="16" r="5.5" fill="#00D9FF" />

  <!-- E2: purple, right -->
  <circle cx="108" cy="64" r="4.5" fill="#6C63FF" />

  <!-- E3: gradient, bottom-left -->
  <circle cx="32" cy="100" r="5" fill="url(#fgPC)" />

  <!-- nucleus body -->
  <circle cx="60" cy="60" r="20" fill="url(#fnucleus)" />

  <!-- hot core -->
  <circle cx="60" cy="60" r="8" fill="url(#fcoreGlow)" />
  <circle cx="60" cy="60" r="3.6" fill="#ffffff" />
</svg>
