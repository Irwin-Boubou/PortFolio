<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <linearGradient id="gH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <radialGradient id="nucleus" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="45%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#3A34CC" />
    </radialGradient>
    <radialGradient id="gl1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- ambient glow -->
  <circle cx="60" cy="60" r="56" fill="url(#gl1)" />
  <circle cx="66" cy="54" r="46" fill="url(#gl2)" />

  <!-- orbit ring 1 (60deg) -->
  <g transform="rotate(60 60 60)">
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="url(#gPC)" stroke-width="2.6" stroke-opacity="0.25" />
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="url(#gPC)" stroke-width="1.1" />
  </g>

  <!-- orbit ring 2 (-60deg) -->
  <g transform="rotate(-60 60 60)">
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="#00D9FF" stroke-width="2.6" stroke-opacity="0.22" />
    <ellipse cx="60" cy="60" rx="50" ry="19" fill="none" stroke="#00D9FF" stroke-width="1.1" />
  </g>

  <!-- orbit ring 3 (equatorial) -->
  <ellipse cx="60" cy="60" rx="50" ry="14" fill="none" stroke="url(#gH)" stroke-width="1.1" />

  <!-- electrons -->
  <!-- E1: brightest, cyan, top-right -->
  <circle cx="90" cy="16" r="9" fill="url(#gl2)" />
  <circle cx="90" cy="16" r="5.5" fill="#00D9FF" />
  <circle cx="88.3" cy="14.3" r="1.4" fill="#ffffff" opacity="0.85" />

  <!-- E2: purple, right -->
  <circle cx="108" cy="64" r="7" fill="url(#gl1)" />
  <circle cx="108" cy="64" r="4.5" fill="#6C63FF" />
  <circle cx="106.7" cy="62.7" r="1.1" fill="#ffffff" opacity="0.7" />

  <!-- E3: gradient, bottom-left -->
  <circle cx="32" cy="100" r="8" fill="url(#gl1)" />
  <circle cx="32" cy="100" r="5" fill="url(#gPC)" />
  <circle cx="30.7" cy="98.7" r="1.2" fill="#ffffff" opacity="0.75" />

  <!-- E4 -->
  <circle cx="18" cy="42" r="3.5" fill="#6C63FF" opacity="0.75" />
  <circle cx="17.1" cy="41.1" r="0.9" fill="#ffffff" opacity="0.5" />

  <!-- E5 -->
  <circle cx="96" cy="98" r="3" fill="#00D9FF" opacity="0.7" />
  <circle cx="95.2" cy="97.2" r="0.8" fill="#ffffff" opacity="0.5" />

  <!-- E6 -->
  <circle cx="8" cy="62" r="3" fill="#8877FF" opacity="0.65" />
  <circle cx="7.2" cy="61.2" r="0.8" fill="#ffffff" opacity="0.45" />

  <!-- nucleus outer glow -->
  <circle cx="60" cy="60" r="30" fill="url(#gl1)" />
  <circle cx="60" cy="60" r="24" fill="url(#gl2)" />

  <!-- nucleus shell ring -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="url(#gPC)" stroke-width="1" stroke-opacity="0.6" />

  <!-- nucleus body -->
  <circle cx="60" cy="60" r="20" fill="url(#nucleus)" />

  <!-- proton clusters -->
  <circle cx="52" cy="54" r="4.5" fill="#ffffff" opacity="0.18" />
  <circle cx="68" cy="53" r="3.8" fill="#ffffff" opacity="0.15" />
  <circle cx="66" cy="68" r="4.2" fill="#3A34CC" opacity="0.25" />
  <circle cx="53" cy="67" r="3.5" fill="#3A34CC" opacity="0.22" />

  <!-- hot core -->
  <circle cx="60" cy="60" r="8" fill="url(#coreGlow)" />
  <circle cx="60" cy="60" r="3.6" fill="#ffffff" />

  <!-- specular highlight -->
  <circle cx="53" cy="53" r="3" fill="#ffffff" opacity="0.55" />
</svg>
