<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <linearGradient id="gH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <radialGradient id="nucleus" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="45%" stop-color="#9B94FF" />
      <stop offset="100%" stop-color="#3A34CC" />
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gl1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gl2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- ambient glow -->
  <circle cx="58" cy="58" r="56" fill="url(#gl1)" />
  <circle cx="66" cy="54" r="44" fill="url(#gl2)" />

  <!-- ring 1: flat oval, purple, tilted 55deg -->
  <g transform="rotate(55 60 60)"><ellipse cx="60" cy="60" rx="48" ry="22" fill="none" stroke="#6C63FF" stroke-width="5" stroke-linecap="round"/></g>
  <!-- ring 2: near-circular, cyan, tilted -55deg -->
  <g transform="rotate(-55 60 60)"><ellipse cx="60" cy="60" rx="40" ry="36" fill="none" stroke="#00D9FF" stroke-width="5" stroke-linecap="round"/></g>
  <!-- ring 3: wide flat equatorial, gradient -->
  <ellipse cx="60" cy="60" rx="50" ry="14" fill="none" stroke="url(#gH)" stroke-width="5" stroke-linecap="round"/>

  <!-- nucleus -->
  <circle cx="60" cy="60" r="26" fill="none" stroke="url(#gPC)" stroke-width="1.5" stroke-opacity="0.75"/>
  <circle cx="60" cy="60" r="23" fill="url(#nucleus)"/>
  <circle cx="60" cy="60" r="9.5" fill="url(#coreGlow)"/>
  <circle cx="60" cy="60" r="4.5" fill="#ffffff"/>
  <circle cx="53" cy="53" r="2.6" fill="#ffffff" opacity="0.5"/>

  <!-- electrons (each with a soft halo) -->
  <circle cx="97" cy="17" r="13" fill="url(#gl2)"/>
  <circle cx="97" cy="17" r="8.5" fill="#00D9FF"/>
  <circle cx="104" cy="82" r="10" fill="url(#gl1)"/>
  <circle cx="104" cy="82" r="6.5" fill="#6C63FF"/>
  <circle cx="22" cy="94" r="11" fill="url(#gl1)"/>
  <circle cx="22" cy="94" r="7" fill="url(#gPC)"/>
  <circle cx="12" cy="46" r="4" fill="#8B84FF" opacity="0.85"/>
  <circle cx="70" cy="106" r="4" fill="#00D9FF" opacity="0.8"/>
</svg>
